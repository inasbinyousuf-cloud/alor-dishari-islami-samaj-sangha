<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>সদস্য ড্যাশবোর্ড — আলোর দিশারী</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
:root{
  --gd:#065f30;--gm:#0b8b44;--gl:#e8f7ee;--gp:#f0faf4;
  --gold:#c9a84c;--goldl:#f5e6c0;--bg:#f4f8f5;--white:#fff;
  --sh:0 4px 20px rgba(6,95,48,0.10);--r:14px;--sb:250px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans Bengali',sans-serif;}
body{background:var(--bg);color:#1a2e1e;}

/* HEADER */
.hdr{
  background:var(--gd);height:62px;
  display:flex;align-items:center;justify-content:space-between;padding:0 22px;
  position:sticky;top:0;z-index:900;box-shadow:0 2px 16px rgba(0,0,0,0.25);
}
.hdr-left{display:flex;align-items:center;gap:12px;}
.mob-tog{background:none;border:none;color:rgba(255,255,255,0.8);font-size:19px;cursor:pointer;padding:6px;}
.hdr-brand{font-size:15px;font-weight:700;color:white;line-height:1.2;}
.hdr-brand small{display:block;font-size:11px;font-weight:400;opacity:0.6;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.btn-logout{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:1px solid rgba(255,255,255,0.2);padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:0.2s;}
.btn-logout:hover{background:rgba(255,255,255,0.22);}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 62px);}

/* SIDEBAR */
.sidebar{
  width:var(--sb);background:white;
  box-shadow:2px 0 16px rgba(0,0,0,0.06);
  flex-shrink:0;position:sticky;top:62px;
  height:calc(100vh - 62px);overflow-y:auto;transition:0.3s;
}
.s-profile{padding:22px 18px;border-bottom:1px solid var(--gp);text-align:center;}
.s-avatar-wrap{position:relative;width:84px;margin:0 auto 12px;}
.s-avatar{
  width:84px;height:84px;border-radius:50%;
  border:4px solid var(--gm);overflow:hidden;
  background:var(--gl);display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:800;color:var(--gm);
}
.s-avatar img{width:100%;height:100%;object-fit:cover;}
.s-status-dot{
  position:absolute;bottom:4px;right:4px;
  width:14px;height:14px;border-radius:50%;
  background:#2ecc71;border:2px solid white;
}
.s-name{font-size:15px;font-weight:800;color:var(--gd);margin-bottom:4px;}
.s-mid{font-size:12px;color:var(--gm);background:var(--gl);padding:3px 12px;border-radius:100px;display:inline-block;font-weight:700;}
.nav-menu{padding:14px 10px;}
.nitem{
  display:flex;align-items:center;gap:11px;
  padding:12px 14px;border-radius:10px;
  font-size:13px;font-weight:600;color:#555;
  cursor:pointer;transition:0.2s;margin-bottom:3px;
  text-decoration:none;border:none;background:none;width:100%;text-align:left;
}
.nitem i{width:18px;text-align:center;font-size:15px;}
.nitem:hover{background:var(--gp);color:var(--gm);}
.nitem.active{background:var(--gl);color:var(--gm);font-weight:700;}
.nitem.active i{color:var(--gm);}
.nav-divider{border:none;border-top:1px solid var(--gp);margin:10px 0;}
.nitem.red{color:#e74c3c;}
.nitem.red:hover{background:#ffe8e8;}

/* MAIN */
.main{flex:1;padding:22px;overflow-x:hidden;}

/* STAT CARDS */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.sc{background:white;border-radius:var(--r);padding:18px 16px;box-shadow:var(--sh);display:flex;align-items:center;gap:14px;}
.sc-ico{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ic-g{background:var(--gl);color:var(--gm);}
.ic-o{background:var(--goldl);color:var(--gold);}
.ic-r{background:#ffe8e8;color:#e74c3c;}
.ic-b{background:#e8f0ff;color:#2980b9;}
.sc-info .v{font-size:22px;font-weight:800;color:var(--gd);}
.sc-info .l{font-size:11px;color:#999;font-weight:600;margin-top:2px;}

/* CONTENT CARD */
.cc{background:white;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.cc-head{padding:18px 22px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.cc-head h3{font-size:16px;font-weight:700;color:var(--gd);display:flex;align-items:center;gap:8px;}
.cc-body{padding:22px;}

/* PROFILE INFO */
.profile-photo-card{display:flex;align-items:center;gap:20px;padding:20px;background:var(--gp);border-radius:12px;margin-bottom:20px;border:1px solid #d4e8d8;}
.pp-img{width:90px;height:90px;border-radius:50%;border:4px solid var(--gm);overflow:hidden;background:var(--gl);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:var(--gm);}
.pp-img img{width:100%;height:100%;object-fit:cover;}
.pp-info h3{font-size:18px;font-weight:800;color:var(--gd);margin-bottom:4px;}
.pp-info .pid{font-size:13px;font-weight:700;color:var(--gm);background:var(--gl);padding:3px 12px;border-radius:100px;display:inline-block;margin-bottom:8px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.info-box{background:var(--gp);border-radius:10px;padding:13px 15px;border:1px solid #d4e8d8;}
.info-box .ik{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--gm);margin-bottom:4px;}
.info-box .iv{font-size:14px;font-weight:700;color:var(--gd);}
.badge-status{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:700;}
.bs-ok{background:#d4edda;color:#155724;}
.bs-wait{background:#fff3cd;color:#856404;}
.bs-no{background:#ffe0e0;color:#721c24;}

/* TABLE */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--gd);color:white;padding:12px 13px;text-align:left;font-size:12px;font-weight:600;white-space:nowrap;}
thead th:first-child{border-radius:8px 0 0 0;}
thead th:last-child{border-radius:0 8px 0 0;}
tbody td{padding:12px 13px;border-bottom:1px solid #f5f5f5;vertical-align:middle;}
tbody tr:hover td{background:var(--gp);}
.empty-row{text-align:center;padding:50px;color:#bbb;}
.empty-row i{font-size:32px;display:block;margin-bottom:10px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;}
.b-ok{background:#d4edda;color:#155724;}
.b-wait{background:#fff3cd;color:#856404;}

/* NOTICE */
.notice-item{padding:16px 18px;border-left:4px solid var(--gm);background:var(--gp);border-radius:8px;margin-bottom:12px;}
.notice-item h4{font-size:14px;font-weight:700;color:var(--gd);margin-bottom:6px;}
.notice-item p{font-size:13px;color:#555;line-height:1.7;}
.notice-item .ndate{font-size:11px;color:var(--gm);font-weight:600;margin-top:7px;}

/* COMMITTEE GRID */
.com-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
.com-card{background:var(--gp);border-radius:12px;padding:20px 14px;text-align:center;border:1px solid #d4e8d8;}
.com-img{width:72px;height:72px;border-radius:50%;margin:0 auto 10px;overflow:hidden;background:var(--gl);border:3px solid var(--gm);display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--gm);}
.com-img img{width:100%;height:100%;object-fit:cover;}
.com-pos{font-size:10px;font-weight:700;color:var(--gm);background:var(--gl);padding:3px 10px;border-radius:100px;display:inline-block;margin-bottom:7px;}
.com-name{font-size:13px;font-weight:700;color:var(--gd);margin-bottom:3px;}
.com-phone{font-size:11px;color:#777;margin-bottom:2px;}
.com-email{font-size:10px;color:var(--gm);}

/* LOADER */
.pg-loader{text-align:center;padding:60px 20px;color:#bbb;}
.pg-sp{width:38px;height:38px;border:3px solid var(--gl);border-top-color:var(--gm);border-radius:50%;animation:sp 0.8s linear infinite;margin:0 auto 14px;}
@keyframes sp{to{transform:rotate(360deg);}}

/* MOBILE OVERLAY */
.mob-ov{display:none;position:fixed;inset:0;top:62px;background:rgba(0,0,0,0.4);z-index:499;}
.mob-ov.show{display:block;}

/* RESPONSIVE */
@media(max-width:1024px){.stat-row{grid-template-columns:repeat(2,1fr);}}
@media(max-width:768px){
  .mob-tog{display:block;}
  .sidebar{position:fixed;left:-260px;top:62px;z-index:500;height:calc(100vh - 62px);}
  .sidebar.open{left:0;}
  .main{padding:14px;}
  .info-grid{grid-template-columns:1fr;}
  .profile-photo-card{flex-direction:column;text-align:center;}
}
@media(max-width:480px){
  .stat-row{grid-template-columns:1fr 1fr;}
  .com-grid{grid-template-columns:repeat(2,1fr);}
  .month-grid{grid-template-columns:repeat(3,1fr)!important;}
}
@media(max-width:380px){
  .hdr{padding:0 12px;}
  .hdr-brand{font-size:13px;}
  .hdr-brand small{font-size:10px;}
  .btn-logout{padding:6px 10px;font-size:12px;}
  .pgrid2{grid-template-columns:1fr;}
  .method-mini{grid-template-columns:repeat(3,1fr);}
}
/* PAYMENT SUBMIT */
.pay-form{background:var(--gp);border-radius:12px;padding:20px;border:1px solid #d4e8d8;margin-bottom:20px;}
.pay-form h4{font-size:15px;font-weight:700;color:var(--gd);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.pfg{margin-bottom:14px;}
.pfg label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.pfg input,.pfg select,.pfg textarea{
  width:100%;padding:10px 12px;border:1.5px solid #d4e8d8;border-radius:9px;
  font-size:14px;font-family:inherit;outline:none;transition:.2s;background:white;
}
.pfg input:focus,.pfg select:focus{border-color:var(--gm);box-shadow:0 0 0 3px rgba(11,139,68,.1);}
.pfg textarea{resize:vertical;min-height:60px;}
.pgrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-pay-submit{
  width:100%;padding:13px;background:var(--gm);color:white;
  font-size:15px;font-weight:800;border:none;border-radius:10px;
  cursor:pointer;font-family:inherit;transition:.2s;
  display:flex;align-items:center;justify-content:center;gap:9px;
}
.btn-pay-submit:hover{background:var(--gd);}
.btn-pay-submit:disabled{opacity:.6;cursor:not-allowed;}
.pay-sp{display:none;align-items:center;justify-content:center;gap:7px;margin-top:10px;color:var(--gm);font-weight:600;font-size:13px;}
.pay-sp-dot{width:14px;height:14px;border:2.5px solid var(--gl);border-top-color:var(--gm);border-radius:50%;animation:sp .7s linear infinite;}
.pay-err{display:none;background:#fff0f0;border:1px solid #ffc5c5;border-radius:9px;padding:10px 14px;color:#c0392b;font-size:13px;font-weight:600;text-align:center;margin-top:10px;}
.pay-ok{display:none;background:var(--gl);border:1px solid #a3d8a3;border-radius:9px;padding:10px 14px;color:var(--gd);font-size:13px;font-weight:700;text-align:center;margin-top:10px;}
/* MONTH TRACKER */
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;}
.month-cell{border-radius:10px;padding:12px 8px;text-align:center;border:2px solid transparent;}
.mc-paid{background:var(--gl);border-color:var(--gm);}
.mc-due{background:#fff0f0;border-color:#ffc5c5;}
.mc-future{background:#f5f5f5;border-color:#e0e0e0;}
.mc-name{font-size:12px;font-weight:700;color:#444;margin-bottom:5px;}
.mc-paid .mc-name{color:var(--gd);}
.mc-status{font-size:11px;font-weight:800;}
.mc-paid .mc-status{color:var(--gm);}
.mc-due .mc-status{color:#e74c3c;}
.mc-future .mc-status{color:#bbb;}
.mc-amount{font-size:10px;color:#888;margin-top:2px;}
.mc-paid .mc-amount{color:var(--gm);}
.method-mini{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:6px;}
.mm-btn{
  border:1.5px solid #d4e8d8;border-radius:8px;padding:8px 4px;
  background:#fafafa;cursor:pointer;text-align:center;
  font-size:10px;font-weight:700;color:#666;font-family:inherit;transition:.2s;
}
.mm-btn i{display:block;font-size:14px;margin-bottom:3px;}
.mm-btn.msel{border-color:var(--gm);background:var(--gl);color:var(--gd);}

/* FUND LEDGER (view-only) */
.ledger-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.ledger-c{background:var(--gp);border:1px solid #d4e8d8;border-radius:12px;padding:16px;text-align:center;}
.ledger-c .v{font-size:19px;font-weight:800;}
.ledger-c .l{font-size:11px;color:#888;font-weight:600;margin-top:4px;}
.view-only-note{background:#fff8e6;border:1px solid #f0dca0;border-radius:9px;padding:10px 14px;font-size:12px;color:#7a5a10;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.badge-cat{background:#e8f0ff;color:#0c4a8a;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;white-space:nowrap;}
@media(max-width:768px){.ledger-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:420px){.ledger-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-left">
    <button class="mob-tog" onclick="toggleSidebar()"><i class="fa fa-bars"></i></button>
    <div class="hdr-brand">
      সদস্য পোর্টাল
      <small>আলোর দিশারী ইসলামি সমাজ সংঘ</small>
    </div>
  </div>
  <div class="hdr-right">
    <button class="btn-logout" onclick="doLogout()"><i class="fa fa-right-from-bracket"></i> লগআউট</button>
  </div>
</header>

<div class="mob-ov" id="mobOv" onclick="closeSidebar()"></div>

<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="s-profile">
    <div class="s-avatar-wrap">
      <div class="s-avatar" id="sAvatar"><i class="fa fa-user"></i></div>
      <div class="s-status-dot"></div>
    </div>
    <div class="s-name" id="sName">লোড হচ্ছে...</div>
    <div class="s-mid" id="sMid">—</div>
  </div>
  <nav class="nav-menu">
    <button class="nitem active" onclick="showTab('profile',this)"><i class="fa fa-user"></i> আমার প্রোফাইল</button>
    <button class="nitem" onclick="showTab('payments',this)"><i class="fa fa-receipt"></i> পেমেন্ট ইতিহাস</button>
    <button class="nitem" onclick="showTab('paynow',this)"><i class="fa fa-hand-holding-dollar"></i> চাঁদা জমা দিন</button>
    <button class="nitem" onclick="showTab('fund',this)"><i class="fa fa-scale-balanced"></i> তহবিল হিসাব</button>
    <button class="nitem" onclick="showTab('notice',this)"><i class="fa fa-bell"></i> নোটিশ</button>
    <button class="nitem" onclick="showTab('committee',this)"><i class="fa fa-people-group"></i> কমিটি</button>
    <hr class="nav-divider">
    <a href="index.html" class="nitem"><i class="fa fa-house"></i> হোম পেজ</a>
    <button class="nitem red" onclick="doLogout()"><i class="fa fa-right-from-bracket"></i> লগআউট</button>
  </nav>
</aside>

<!-- MAIN -->
<main class="main">
  <!-- STATS -->
  <div class="stat-row">
    <div class="sc"><div class="sc-ico ic-g"><i class="fa fa-money-bill-wave"></i></div><div class="sc-info"><div class="v" id="stTotal">৳০</div><div class="l">মোট প্রদান</div></div></div>
    <div class="sc"><div class="sc-ico ic-o"><i class="fa fa-calendar-days"></i></div><div class="sc-info"><div class="v" id="stYear">৳০</div><div class="l">এই বছর</div></div></div>
    <div class="sc"><div class="sc-ico ic-r"><i class="fa fa-triangle-exclamation"></i></div><div class="sc-info"><div class="v" id="stDue">৳০</div><div class="l">বকেয়া</div></div></div>
    <div class="sc"><div class="sc-ico ic-b"><i class="fa fa-receipt"></i></div><div class="sc-info"><div class="v" id="stCount">০</div><div class="l">পেমেন্ট সংখ্যা</div></div></div>
  </div>

  <!-- CONTENT -->
  <div class="cc" id="contentCard">
    <div class="pg-loader"><div class="pg-sp"></div><p>তথ্য লোড হচ্ছে...</p></div>
  </div>
</main>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbylWYwlgex-a1EB00_rK7Y7_g46DePDMeE3tBSq8TI7BbTpCLtsuASMAxkgwLdnXX1Ncg/exec";

if(localStorage.getItem("memberLoggedIn")!=="true") window.location.href="login.html";
const MID = localStorage.getItem("memberId")||"";
let profileCache = {};

function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");document.getElementById("mobOv").classList.toggle("show");}
function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("mobOv").classList.remove("show");}

function setContent(html){document.getElementById("contentCard").innerHTML=html;}
function loader(){setContent('<div class="pg-loader"><div class="pg-sp"></div><p>লোড হচ্ছে...</p></div>');}

function showTab(tab, el){
  closeSidebar();
  document.querySelectorAll(".nitem").forEach(n=>n.classList.remove("active"));
  if(el) el.classList.add("active");
  if(tab==="profile") renderProfile();
  else if(tab==="payments") loadPayments();
  else if(tab==="notice") loadNotice();
  else if(tab==="committee") loadCommittee();
  else if(tab==="paynow") loadPayNow();
  else if(tab==="fund") loadFundView();
}

function stBadge(s){
  if(!s)return'<span class="badge b-wait"><i class="fa fa-clock"></i> Pending</span>';
  const l=s.toLowerCase();
  if(l.includes("approved")||l.includes("অনুমোদিত")) return `<span class="badge b-ok"><i class="fa fa-check"></i> ${s}</span>`;
  if(l.includes("reject")) return `<span class="badge" style="background:#ffe0e0;color:#721c24;"><i class="fa fa-times"></i> ${s}</span>`;
  return `<span class="badge b-wait"><i class="fa fa-clock"></i> ${s}</span>`;
}

/* ===== LOAD PROFILE ===== */
async function loadProfile(){
  try{
    const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"getMember",memberId:MID})});
    const d=await res.json();
    if(d.success){
      profileCache=d;
      // Sidebar
      const name=d.name||MID;
      document.getElementById("sName").textContent=name;
      document.getElementById("sMid").textContent=d.memberId||MID;
      // Avatar
      const av=document.getElementById("sAvatar");
      if(d.photo&&d.photo.length>10){
        av.innerHTML=`<img src="${d.photo}" alt="">`;
      } else {
        av.innerHTML=`<span>${name.charAt(0)}</span>`;
      }
    }
  }catch(e){console.log(e);}
  renderProfile();
  loadPayments();
}

/* ===== RENDER PROFILE ===== */
function renderProfile(){
  const d=profileCache;
  const name=d.name||localStorage.getItem("memberName")||"—";
  const photo=d.photo||"";
  setContent(`
    <div class="cc-head"><h3><i class="fa fa-user" style="color:var(--gm)"></i> আমার প্রোফাইল</h3>${stBadge(d.status||"Pending")}</div>
    <div class="cc-body">
      <div class="profile-photo-card">
        <div class="pp-img">
          ${photo&&photo.length>10?`<img src="${photo}" alt="photo">`:`<span>${name.charAt(0)}</span>`}
        </div>
        <div class="pp-info">
          <h3>${name}</h3>
          <div class="pid">${d.memberId||MID}</div><br>
          ${stBadge(d.status||"Pending")}
        </div>
      </div>
      <div class="info-grid">
        <div class="info-box"><div class="ik">মোবাইল</div><div class="iv"><i class="fa fa-phone" style="color:var(--gm);font-size:12px"></i> ${d.mobile||"—"}</div></div>
        <div class="info-box"><div class="ik">ইমেইল</div><div class="iv"><i class="fa fa-envelope" style="color:var(--gm);font-size:12px"></i> ${d.email||"—"}</div></div>

function handlePayTypeChange(val){
  const mw=document.getElementById("pn-month-wrap");
  const or=document.getElementById("pn-other-row");
  if(val==="মাসিক চাঁদা"){
    if(mw)mw.style.display="";
    if(or)or.style.display="none";
    const am=document.getElementById("pn-amount");if(am)am.value="50";
  } else if(val==="অন্যান্য"){
    if(mw)mw.style.display="none";
    if(or)or.style.display="";
    const am=document.getElementById("pn-amount");if(am)am.value="";
  } else {
    if(mw)mw.style.display="none";
    if(or)or.style.display="none";
    const am=document.getElementById("pn-amount");if(am)am.value="";
  }
}

function selPayMethod(btn){
  document.querySelectorAll(".mm-btn").forEach(b=>b.classList.remove("msel"));
  btn.classList.add("msel");
  payNowMethod=btn.dataset.m;
}

async function loadMonthTracker(){
  const year=new Date().getFullYear();
  const curMonth=new Date().getMonth();
  try{
    const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"paymentHistory",memberId:MID})});
    const d=await res.json();
    const pays=d.payments||[];
    // Build a map of paid months
    const paidMap={};
    pays.forEach(p=>{
      if((p.paymentType||"").includes("মাসিক")||(p.month||"").includes(year)||(p.month||"").length>2){
        const k=(p.month||"").trim();
        if(k&&k!=="—") paidMap[k]={amount:p.amount,date:p.date};
      }
    });
    const tracker=document.getElementById("monthTracker");
    if(!tracker)return;
    tracker.innerHTML=BN_MONTHS.map((m,i)=>{
      const key=m+" "+year;
      if(paidMap[key]){
        // পরিশোধিত মাস
        return `<div class="month-cell mc-paid"><div class="mc-name">${m}</div><div class="mc-status"><i class="fa fa-check"></i> পরিশোধ</div><div class="mc-amount">৳${paidMap[key].amount}</div></div>`;
      } else if(i===curMonth){
        // শুধু চলতি মাসই বাকি দেখাবে
        return `<div class="month-cell mc-due"><div class="mc-name">${m}</div><div class="mc-status"><i class="fa fa-triangle-exclamation"></i> বাকি</div><div class="mc-amount">৳৫০</div></div>`;
      } else if(i<curMonth){
        // আগের মাস — বকেয়া নয়, রিসেট করা হয়েছে
        return `<div class="month-cell mc-future" style="opacity:.55;"><div class="mc-name">${m}</div><div class="mc-status" style="color:#aaa;">—</div><div class="mc-amount">&nbsp;</div></div>`;
      } else {
        // ভবিষ্যৎ মাস
        return `<div class="month-cell mc-future"><div class="mc-name">${m}</div><div class="mc-status">—</div><div class="mc-amount">&nbsp;</div></div>`;
      }
    }).join("");
  }catch(e){}
}

async function submitMemberPayment(){
  const pnErr=document.getElementById("pnErr");
  const pnOk=document.getElementById("pnOk");
  const btn=document.getElementById("pnSubmitBtn");
  const sp=document.getElementById("pnSp");
  pnErr.style.display="none"; pnOk.style.display="none";

  const type=(document.getElementById("pn-type")||{}).value||"মাসিক চাঁদা";
  const month=(document.getElementById("pn-month")||{}).value||"—";
  const otherText=(document.getElementById("pn-other-text")||{}).value||"";
  const amount=(document.getElementById("pn-amount")||{}).value||"";
  const trxId=(document.getElementById("pn-trx")||{}).value||"";
  const note=(document.getElementById("pn-note")||{}).value||"";

  if(!amount||Number(amount)<1){pnErr.textContent="⚠️ পরিমাণ দিন";pnErr.style.display="block";return;}
  if(type==="মাসিক চাঁদা"&&(!month||month==="—")){pnErr.textContent="⚠️ মাস বাছাই করুন";pnErr.style.display="block";return;}
  if(type==="অন্যান্য"&&!otherText){pnErr.textContent="⚠️ বিষয় লিখুন";pnErr.style.display="block";return;}

  const finalType=type==="অন্যান্য"?otherText:type;
  btn.disabled=true; sp.style.display="flex";

  try{
    const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({
      action:"memberPayment",
      memberId:MID,
      memberName:localStorage.getItem("memberName")||MID,
      paymentType:finalType,
      month:type==="মাসিক চাঁদা"?month:"—",
      amount,
      method:payNowMethod,
      trxId:trxId||"—",
      note:note||"—"
    })});
    const data=await res.json();
    sp.style.display="none"; btn.disabled=false;
    if(data.success){
      pnOk.textContent="✅ পেমেন্ট সফলভাবে জমা হয়েছে! Admin যাচাই করলে নিশ্চিত হবে।";
      pnOk.style.display="block";
      ["pn-trx","pn-note"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
      const am=document.getElementById("pn-amount");if(am)am.value="50";
      loadMonthTracker();
      loadPayments(); // refresh stats
    } else {
      pnErr.textContent="⚠️ "+(data.message||"সমস্যা হয়েছে, আবার চেষ্টা করুন");
      pnErr.style.display="block";
    }
  }catch(e){
    sp.style.display="none"; btn.disabled=false;
    pnErr.textContent="⚠️ সংযোগ ব্যর্থ হয়েছে";
    pnErr.style.display="block";
  }
}

/* ===== PAYMENTS ===== */
async function loadPayments(){
  loader();
  try{
    const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"paymentHistory",memberId:MID})});
    const d=await res.json();
    const pays=d.payments||[];
    const year=new Date().getFullYear();
    let total=0,yearT=0,count=0;
    pays.forEach(p=>{
      count++;total+=Number(p.amount)||0;
      if(String(p.date||"").includes(year)) yearT+=Number(p.amount)||0;
    });
    // বকেয়া হিসাব — শুধু চলতি মাসের চাঁদা (পূর্ববর্তী বকেয়া রিসেট করা হয়েছে)
    const BNM=["জানুয়ারি","ফেব্রুয়ারি","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টেম্বর","অক্টোবর","নভেম্বর","ডিসেম্বর"];
    const _now=new Date();
    const curKey=BNM[_now.getMonth()]+" "+_now.getFullYear();
    const curPaid=pays
      .filter(p=>(p.paymentType||"মাসিক চাঁদা").includes("মাসিক") && (p.month||"").trim()===curKey && (p.status||"Paid")!=="Rejected")
      .reduce((s,p)=>s+(Number(p.amount)||0),0);
    const due=Math.max(0,50-curPaid);
    document.getElementById("stTotal").textContent="৳"+total;
    document.getElementById("stYear").textContent="৳"+yearT;
    document.getElementById("stDue").textContent="৳"+due;
    document.getElementById("stCount").textContent=count;

    const rows=pays.length?pays.map(p=>`
      <tr>
        <td><span style="font-size:12px;font-weight:700;color:var(--gm);">${p.paymentType||"মাসিক চাঁদা"}</span></td>
        <td>${p.month||"—"}</td>
        <td><b>৳${p.amount||0}</b></td>
        <td>${p.method||"—"}</td>
        <td><code style="font-size:11px;background:#f5f5f5;padding:2px 6px;border-radius:4px;">${p.trxId||"—"}</code></td>
        <td>${p.date||"—"}</td>
        <td><span class="badge b-ok"><i class="fa fa-check"></i> ${p.status||"Paid"}</span></td>
      </tr>`).join(""):
      `<tr><td colspan="7" class="empty-row"><i class="fa fa-inbox"></i>কোনো পেমেন্ট রেকর্ড পাওয়া যায়নি</td></tr>`;

    setContent(`
      <div class="cc-head"><h3><i class="fa fa-receipt" style="color:var(--gm)"></i> পেমেন্ট ইতিহাস</h3><span style="font-size:12px;color:#888;">মাসিক চাঁদা ৳৫০</span></div>
      <div class="cc-body">
        <div class="tw">
          <table>
            <thead><tr><th>ধরন</th><th>মাস</th><th>টাকা</th><th>মাধ্যম</th><th>Trx ID</th><th>তারিখ</th><th>Status</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `);
  }catch(e){setContent(`<div class="cc-body"><p style="color:#e74c3c;">পেমেন্ট তথ্য লোড করা যায়নি।</p></div>`);}
}

async function loadFundView(){
  loader();
  try{
    const [payRes, expRes] = await Promise.all([
      fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"getAllPayments"})}).then(r=>r.json()),
      fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"getExpenses"})}).then(r=>r.json())

    const pays = payRes.payments||[];

    const pending = pays.filter(p=>(p.status||"").includes("Pending")).reduce((s,p)=>s+(Number(p.amount)||0),0);

    const rows = exps.length ? exps.map(e=>`

      <div class="cc-body">

        <div class="ledger-grid">
          <div class="ledger-c"><div class="v" style="color:var(--gm)">৳${income.toLocaleString("bn-BD")}</div><div class="l">মোট আয় (যাচাইকৃত)</div></div>
          <div class="ledger-c"><div class="v" style="color:#f39c12">৳${pending.toLocaleString("bn-BD")}</div><div class="l">যাচাই বাকি</div></div>
          <div class="ledger-c"><div class="v" style="color:#e74c3c">৳${expense.toLocaleString("bn-BD")}</div><div class="l">মোট ব্যয়</div></div>
          <div class="ledger-c"><div class="v" style="color:${balance>=0?"var(--gm)":"#e74c3c"}">৳${Math.abs(balance).toLocaleString("bn-BD")}${balance<0?" (ঘাটতি)":""}</div><div class="l">বর্তমান স্থিতি</div></div>
        </div>
        <div class="tw">
          <table>
            <thead><tr><th>তারিখ</th><th>বিভাগ</th><th>বিবরণ</th><th>পরিমাণ</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>

  }catch(e){

      {name:"হাসান শাহরিয়ার",position:"সাধারণ সম্পাদক",mobile:"",email:"",photo:""},
      {name:"আব্দুল জব্বার",position:"অর্থ সম্পাদক",mobile:"",email:"",photo:""},
      {name:"মোঃ মিজান",position:"সাংগঠনিক সম্পাদক",mobile:"",email:"",photo:""},
      {name:"জোবায়ের সালেহীন (সম্রাট)",position:"সাংগঠনিক সম্পাদক",mobile:"",email:"",photo:""},
      {name:"ইনাজ বিন ইউসুফ",position:"তথ্য ও যোগাযোগ সম্পাদক",mobile:"",email:"",photo:""},
      {name:"এ.কে. খান আবেদীন",position:"ক্রীড়া সম্পাদক",mobile:"",email:"",photo:""},
    ];
    const data=list.length?list:fallback;
    const cards=data.map(c=>`
      <div class="com-card">
        <div class="com-img">
          ${c.photo&&c.photo.length>10?`<img src="${c.photo}" onerror="this.parentElement.innerHTML='<i class=\\'fa fa-user\\'></i>'">`:'<i class="fa fa-user"></i>'}
        </div>
        <div class="com-pos">${c.position||"—"}</div>
        <div class="com-name">${c.name||"—"}</div>
        ${c.mobile?`<div class="com-phone"><i class="fa fa-phone" style="font-size:10px;color:var(--gm)"></i> ${c.mobile}</div>`:''}
        ${c.email?`<div class="com-email"><i class="fa fa-envelope" style="font-size:10px"></i> ${c.email}</div>`:''}
      </div>`).join("");
    setContent(`
      <div class="cc-head"><h3><i class="fa fa-people-group" style="color:var(--gm)"></i> কার্যনির্বাহী কমিটি</h3></div>
      <div class="cc-body"><div class="com-grid">${cards}</div></div>
    `);
  }catch(e){setContent(`<div class="cc-body"><p style="color:#e74c3c;">কমিটি তথ্য লোড করা যায়নি।</p></div>`);}
}

/* ===== LOGOUT ===== */
function doLogout(){
  if(confirm("লগআউট করবেন?")){
    ["memberLoggedIn","memberId","memberName","rememberMemberId"].forEach(k=>localStorage.removeItem(k));
    window.location.href="login.html";
  }
}

/* ===== INIT ===== */
loadProfile();

/* Auto-refresh notice every 60s if on notice tab */
setInterval(()=>{
  if(document.querySelector(".nitem.active")?.textContent?.includes("নোটিশ")) loadNotice();
},60000);
</script>
